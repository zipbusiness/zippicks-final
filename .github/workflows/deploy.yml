name: Deploy to Production

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  IMAGE_NAME: zippicks/api
  PHP_VERSION: '8.2'
  WORDPRESS_VERSION: '6.4'

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zippicks_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, opcache
          coverage: xdebug
          tools: composer:v2, wp-cli

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          vendor/bin/phpstan analyse src --level=7 --no-progress

      - name: Run PHPUnit tests
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: zippicks_test
          DB_USER: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress
        run: |
          # Install WordPress test suite
          bash tests/bin/install-wp-tests.sh zippicks_test root root 127.0.0.1 latest
          
          # Run tests
          cd wp-content/mu-plugins/zippicks-foundation
          vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./wp-content/mu-plugins/zippicks-foundation/coverage.xml
          flags: unittests
          name: zippicks-coverage

      - name: Security scan
        run: |
          # Install security checker
          composer global require enlightn/security-checker
          
          # Run security scan
          cd wp-content/mu-plugins/zippicks-foundation
          ~/.composer/vendor/bin/security-checker security:check composer.lock

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          target: production
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            WORDPRESS_VERSION=${{ env.WORDPRESS_VERSION }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.api.zippicks.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name zippicks-staging --region us-east-1

      - name: Deploy to Kubernetes
        run: |
          # Update image in deployment
          kubectl set image deployment/zippicks-api \
            zippicks-api=${{ needs.build.outputs.image-tag }} \
            -n zippicks-staging
          
          # Wait for rollout to complete
          kubectl rollout status deployment/zippicks-api -n zippicks-staging

      - name: Run smoke tests
        run: |
          # Wait for service to be ready
          sleep 30
          
          # Health check
          curl -f https://staging.api.zippicks.com/health || exit 1
          
          # API smoke test
          curl -f https://staging.api.zippicks.com/wp-json/zippicks/v1/health || exit 1

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Staging deployment ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/production' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.zippicks.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name zippicks-production --region us-east-1

      - name: Create deployment record
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              auto_merge: false
            });
            return deployment.data.id;

      - name: Blue-Green Deployment
        run: |
          # Get current active service (blue or green)
          CURRENT_SERVICE=$(kubectl get service zippicks-api -n zippicks-prod -o jsonpath='{.spec.selector.version}')
          
          if [ "$CURRENT_SERVICE" = "blue" ]; then
            NEW_SERVICE="green"
          else
            NEW_SERVICE="blue"
          fi
          
          echo "Current service: $CURRENT_SERVICE"
          echo "Deploying to: $NEW_SERVICE"
          
          # Deploy to inactive service
          kubectl set image deployment/zippicks-api-$NEW_SERVICE \
            zippicks-api=${{ needs.build.outputs.image-tag }} \
            -n zippicks-prod
          
          # Wait for rollout
          kubectl rollout status deployment/zippicks-api-$NEW_SERVICE -n zippicks-prod
          
          # Run health checks on new deployment
          NEW_SERVICE_IP=$(kubectl get service zippicks-api-$NEW_SERVICE -n zippicks-prod -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          for i in {1..10}; do
            if curl -f http://$NEW_SERVICE_IP/health; then
              echo "Health check passed"
              break
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          
          # Switch traffic to new service
          kubectl patch service zippicks-api -n zippicks-prod -p '{"spec":{"selector":{"version":"'$NEW_SERVICE'"}}}'
          
          echo "Traffic switched to $NEW_SERVICE"
          
          # Keep old deployment running for quick rollback
          echo "OLD_SERVICE=$CURRENT_SERVICE" >> $GITHUB_ENV
          echo "NEW_SERVICE=$NEW_SERVICE" >> $GITHUB_ENV

      - name: Verify deployment
        run: |
          # Run comprehensive tests
          ./scripts/verify-production.sh

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: '${{ job.status }}',
              environment_url: 'https://api.zippicks.com',
              description: 'Deployment ${{ job.status }}'
            });

      - name: Monitor metrics
        run: |
          # Monitor key metrics for 5 minutes
          ./scripts/monitor-deployment.sh

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back to $OLD_SERVICE"
          kubectl patch service zippicks-api -n zippicks-prod -p '{"spec":{"selector":{"version":"'$OLD_SERVICE'"}}}'
          
          # Scale down failed deployment
          kubectl scale deployment/zippicks-api-$NEW_SERVICE --replicas=0 -n zippicks-prod

      - name: Create release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes in this release
            - Deployed commit: ${{ github.sha }}
            - Docker image: ${{ needs.build.outputs.image-tag }}
            
            ## Deployment details
            - Environment: Production
            - Deployment type: Blue-Green
            - Previous version: ${{ env.OLD_SERVICE }}
            - New version: ${{ env.NEW_SERVICE }}
          draft: false
          prerelease: false

      - name: Notify team
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production deployment ${{ job.status }}
            Version: v${{ github.run_number }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Environment: https://api.zippicks.com
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

  cleanup:
    name: Cleanup old images
    needs: [deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Delete old images
        run: |
          # Keep only last 10 images
          # This would be implemented based on your registry's API
          echo "Cleaning up old Docker images..."