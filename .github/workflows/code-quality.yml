name: Code Quality & Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  php-quality:
    name: PHP Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis
          tools: composer:v2, phpcs, phpmd, phpcpd, psalm

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          composer install --prefer-dist --no-progress

      - name: PHP CodeSniffer
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          phpcs --standard=PSR12 --extensions=php --ignore=vendor,tests src/

      - name: PHP Mess Detector
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          phpmd src/ text cleancode,codesize,controversial,design,naming,unusedcode

      - name: PHP Copy/Paste Detector
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          phpcpd src/

      - name: Psalm Static Analysis
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          psalm --show-info=false

      - name: Check for PHP compatibility
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          composer require --dev phpcompatibility/php-compatibility
          ./vendor/bin/phpcs -p src --standard=PHPCompatibility --runtime-set testVersion 8.0-

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/php@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ZipPicks'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload dependency check results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

      - name: WordPress Security Scan
        run: |
          # Install WPScan
          gem install wpscan
          
          # Run security scan (would need actual WordPress URL)
          # wpscan --url https://staging.zippicks.com --api-token ${{ secrets.WPSCAN_API_TOKEN }}

  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: ESLint
        if: always()
        run: |
          if [ -f package.json ]; then
            npx eslint . --ext .js,.jsx,.ts,.tsx
          fi

      - name: Prettier
        if: always()
        run: |
          if [ -f package.json ]; then
            npx prettier --check .
          fi

  infrastructure-validation:
    name: Infrastructure Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Kubernetes manifests
        run: |
          # Install kubeval
          wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo cp kubeval /usr/local/bin
          
          # Validate manifests
          find k8s -name "*.yaml" -o -name "*.yml" | xargs kubeval --strict

      - name: Kubernetes security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'k8s/'
          severity: 'CRITICAL,HIGH'

      - name: Dockerfile linting
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  code-coverage:
    name: Code Coverage Analysis
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zippicks_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, xdebug
          coverage: xdebug

      - name: Install dependencies
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          composer install

      - name: Run tests with coverage
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: zippicks_test
          DB_USER: root
          DB_PASSWORD: root
        run: |
          cd wp-content/mu-plugins/zippicks-foundation
          vendor/bin/phpunit --coverage-html coverage-report --coverage-clover coverage.xml

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: wp-content/mu-plugins/zippicks-foundation/coverage-report/

      - name: Coverage comment
        uses: 5monkeys/cobertura-action@master
        with:
          path: wp-content/mu-plugins/zippicks-foundation/coverage.xml
          minimum_coverage: 70
          show_missing: true
          fail_below_threshold: false

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=zippicks
            -Dsonar.organization=zippicks
            -Dsonar.sources=wp-content/mu-plugins/zippicks-foundation/src
            -Dsonar.tests=wp-content/mu-plugins/zippicks-foundation/tests
            -Dsonar.php.coverage.reportPaths=coverage.xml