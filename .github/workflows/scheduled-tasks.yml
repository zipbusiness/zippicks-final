name: Scheduled Tasks

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
    - cron: '0 * * * *'     # Every hour
    - cron: '0 0 * * *'     # Daily at midnight
    - cron: '0 0 * * 0'     # Weekly on Sunday
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        type: choice
        options:
          - health-check
          - cleanup
          - backup
          - metrics-aggregation
          - security-audit

jobs:
  health-check:
    name: Production Health Check
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/15 * * * *' || github.event.inputs.task == 'health-check'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check API health
        id: health
        run: |
          # Health check endpoints
          ENDPOINTS=(
            "https://api.zippicks.com/health"
            "https://api.zippicks.com/wp-json/zippicks/v1/health"
            "https://staging.api.zippicks.com/health"
          )
          
          FAILED=0
          
          for endpoint in "${ENDPOINTS[@]}"; do
            echo "Checking $endpoint..."
            
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint")
            
            if [ "$RESPONSE" != "200" ]; then
              echo "❌ $endpoint returned $RESPONSE"
              FAILED=$((FAILED + 1))
            else
              echo "✅ $endpoint is healthy"
            fi
          done
          
          if [ $FAILED -gt 0 ]; then
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Check critical services
        run: |
          # Check database connectivity
          ./scripts/check-database.sh
          
          # Check Redis cluster
          ./scripts/check-redis.sh
          
          # Check queue processing
          ./scripts/check-queue.sh

      - name: Alert on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Production health check failed!
            Failed checks: ${{ steps.health.outputs.failed }}
            Time: ${{ github.event.repository.updated_at }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_CRITICAL }}

  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.task == 'cleanup'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Clean up old Docker images
        run: |
          # Login to ECR
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.DOCKER_REGISTRY_URL }}
          
          # Delete images older than 30 days
          REPOSITORY="zippicks/api"
          IMAGES=$(aws ecr describe-images --repository-name $REPOSITORY --query 'imageDetails[?imagePushedAt<`'$(date -d '30 days ago' --iso-8601)'`].imageDigest' --output text)
          
          if [ ! -z "$IMAGES" ]; then
            for digest in $IMAGES; do
              aws ecr batch-delete-image --repository-name $REPOSITORY --image-ids imageDigest=$digest
            done
          fi

      - name: Clean up old logs
        run: |
          # Delete CloudWatch logs older than 90 days
          LOG_GROUPS=$(aws logs describe-log-groups --query 'logGroups[].logGroupName' --output text)
          
          for group in $LOG_GROUPS; do
            if [[ $group == /aws/eks/zippicks* ]]; then
              aws logs put-retention-policy --log-group-name $group --retention-in-days 90
            fi
          done

      - name: Clean up old Kubernetes resources
        run: |
          # Update kubeconfig
          aws eks update-kubeconfig --name zippicks-production
          
          # Delete completed jobs older than 7 days
          kubectl delete jobs --field-selector status.successful=1 -A
          
          # Delete old replicasets
          kubectl delete replicaset --field-selector 'metadata.ownerReferences.kind!=Deployment' -A

  backup:
    name: Backup Critical Data
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.task == 'backup'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Backup database
        run: |
          # Create RDS snapshot
          SNAPSHOT_ID="zippicks-prod-$(date +%Y%m%d-%H%M%S)"
          
          aws rds create-db-snapshot \
            --db-instance-identifier zippicks-production \
            --db-snapshot-identifier $SNAPSHOT_ID
          
          echo "Created snapshot: $SNAPSHOT_ID"

      - name: Backup Redis data
        run: |
          # Trigger Redis backup
          aws elasticache create-snapshot \
            --replication-group-id zippicks-redis-cluster \
            --snapshot-name "redis-backup-$(date +%Y%m%d)"

      - name: Backup application data
        run: |
          # Sync wp-content to S3
          aws s3 sync s3://zippicks-production-wp-content s3://zippicks-backups/wp-content/$(date +%Y%m%d)/ \
            --storage-class GLACIER_IR

      - name: Verify backups
        run: |
          # Check if backups completed successfully
          ./scripts/verify-backups.sh

  metrics-aggregation:
    name: Aggregate Metrics
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event.inputs.task == 'metrics-aggregation'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          # Setup kubectl config
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

      - name: Collect metrics
        run: |
          # Business metrics
          kubectl exec -n zippicks-prod deployment/zippicks-api -- \
            wp zippicks metrics:aggregate --type=business --period=hourly
          
          # Performance metrics
          kubectl exec -n zippicks-prod deployment/zippicks-api -- \
            wp zippicks metrics:aggregate --type=performance --period=hourly
          
          # User engagement metrics
          kubectl exec -n zippicks-prod deployment/zippicks-api -- \
            wp zippicks metrics:aggregate --type=engagement --period=hourly

      - name: Generate reports
        run: |
          # Generate daily reports
          if [[ "$(date +%H)" == "00" ]]; then
            kubectl exec -n zippicks-prod deployment/zippicks-api -- \
              wp zippicks reports:generate --type=daily
          fi
          
          # Generate weekly reports on Sunday
          if [[ "$(date +%u)" == "7" ]] && [[ "$(date +%H)" == "00" ]]; then
            kubectl exec -n zippicks-prod deployment/zippicks-api -- \
              wp zippicks reports:generate --type=weekly
          fi

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 0' || github.event.inputs.task == 'security-audit'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run AWS Security Hub scan
        run: |
          # Get Security Hub findings
          aws securityhub get-findings \
            --filters '{"ProductArn": [{"Value": "arn:aws:securityhub:*:*:product/aws/securityhub", "Comparison": "EQUALS"}]}' \
            --query 'Findings[?Severity.Label==`CRITICAL` || Severity.Label==`HIGH`]'

      - name: Scan Kubernetes cluster
        run: |
          # Update kubeconfig
          aws eks update-kubeconfig --name zippicks-production
          
          # Install kube-bench
          curl -L https://github.com/aquasecurity/kube-bench/releases/download/v0.6.15/kube-bench_0.6.15_linux_amd64.deb -o kube-bench.deb
          sudo dpkg -i kube-bench.deb
          
          # Run CIS benchmark
          kube-bench run --targets node,policies,managedservices

      - name: Check SSL certificates
        run: |
          # Check certificate expiration
          DOMAINS=(
            "api.zippicks.com"
            "www.zippicks.com"
            "staging.api.zippicks.com"
          )
          
          for domain in "${DOMAINS[@]}"; do
            echo "Checking $domain..."
            
            EXPIRY=$(echo | openssl s_client -servername $domain -connect $domain:443 2>/dev/null | openssl x509 -noout -dates | grep notAfter | cut -d= -f2)
            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s)
            CURRENT_EPOCH=$(date +%s)
            DAYS_LEFT=$(( ($EXPIRY_EPOCH - $CURRENT_EPOCH) / 86400 ))
            
            if [ $DAYS_LEFT -lt 30 ]; then
              echo "⚠️  Certificate for $domain expires in $DAYS_LEFT days"
            else
              echo "✅ Certificate for $domain is valid for $DAYS_LEFT days"
            fi
          done

      - name: Generate security report
        run: |
          # Compile all security findings into a report
          ./scripts/generate-security-report.sh > security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report-${{ github.run_id }}
          path: security-report.md